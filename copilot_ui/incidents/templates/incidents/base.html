<!-- incidents/templates/incidents/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IT Ops Copilot{% block title_suffix %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .severity-P1 { background: #dc3545; color: white; }
    .severity-P2 { background: #ffc107; color: black; }
    .severity-P3 { background: #0dcaf0; color: black; }
    .severity-P4 { background: #6c757d; color: white; }
    .runbook-box  { background: #f8f9fa; border-left: 4px solid #0d6efd;
                    padding: 1rem; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="/"> IT Ops Copilot</a>
    <div>
      <a class="btn btn-sm btn-outline-light me-2" href="/">Dashboard</a>
      <a class="btn btn-sm btn-warning me-2"         href="/submit/">+ New Incident</a>
      <a class="btn btn-sm btn-outline-light"         href="/code-review/">Code Review</a>
    </div>
  </nav>

  <div class="container mt-4">
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
