<!-- incidents/templates/incidents/code_review.html -->
{% extends "incidents/base.html" %}
{% block title_suffix %} — Code Review{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10">
    <h2 class="mb-4"> AI Code Review</h2>

    <div class="card mb-4">
      <div class="card-header bg-dark text-white"><strong>Submit Code for Review</strong></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label fw-bold">Language</label>
              <select name="language" class="form-select">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="java">Java</option>
                <option value="go">Go</option>
                <option value="sql">SQL</option>
                <option value="bash">Bash</option>
              </select>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-bold">Context <span class="text-muted fw-normal">(optional)</span></label>
              <input type="text" name="context" class="form-control"
                placeholder="e.g. This runs in a Lambda function handling payment webhooks">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Code</label>
            <textarea name="code" class="form-control" rows="14"
              style="font-family: monospace; font-size: 0.875rem;"
              placeholder="Paste your code here..." required></textarea>
          </div>

          <button type="submit" class="btn btn-dark w-100 fw-bold">
             Review with AI
          </button>
        </form>
      </div>
    </div>

    <!-- Review result -->
    {% if review_result %}
    <div class="card">
      <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
        <strong> Review Result</strong>
        <button class="btn btn-sm btn-outline-light"
          onclick="navigator.clipboard.writeText(document.getElementById('review-text').innerText)">
          Copy
        </button>
      </div>
      <div class="card-body">
        <pre id="review-text" style="white-space: pre-wrap; font-size: 0.9rem;">{{ review_result }}</pre>
      </div>
    </div>
    {% endif %}

  </div>
</div>
{% endblock %}
